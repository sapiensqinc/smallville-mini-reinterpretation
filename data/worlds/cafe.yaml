# Undirected adjacency: who can walk to whom in one tick
adjacency:
  hobbs_cafe: [park, isabella_home, klaus_home, maria_home]
  park: [hobbs_cafe, klaus_home, maria_home]
  isabella_home: [hobbs_cafe]
  klaus_home: [hobbs_cafe, park]
  maria_home: [hobbs_cafe, park]
